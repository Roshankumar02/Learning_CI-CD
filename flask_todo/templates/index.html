<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Flask ToDo List</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    width:420px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

form{
    display:flex;
    gap:10px;
}

input[type="text"]{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 15px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    background:#eee;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.actions a{
    margin-left:10px;
    text-decoration:none;
    padding:5px 10px;
    border-radius:5px;
    font-size:14px;
}

.complete-btn{
    background:#007bff;
    color:white;
}

.delete-btn{
    background:red;
    color:white;
}

.empty{
    text-align:center;
    color:gray;
}

</style>

</head>

<body>

<div class="container">

<h1>Hema's Personal ToDo List</h1>

<form action="/add" method="POST">
<input type="text" name="task" placeholder="Enter a task..." required>
<button type="submit">Add</button>
</form>

<ul>

{% if tasks %}

{% for task in tasks %}

<li>

<span class="{% if task['done'] %}completed{% endif %}">
{{ task['task'] }}
</span>

<div class="actions">

{% if not task['done'] %}
<a class="complete-btn" href="/complete/{{ task['id'] }}">Done</a>
{% endif %}

<a class="delete-btn" href="/delete/{{ task['id'] }}">Delete</a>

</div>

</li>

{% endfor %}

{% else %}

<p class="empty">No tasks yet</p>

{% endif %}

</ul>

</div>

</body>
</html>
